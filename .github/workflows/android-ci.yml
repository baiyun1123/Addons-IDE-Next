name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace --warning-mode all --console=plain assembleDebug

      - name: Build release APK
        run: ./gradlew --no-daemon --stacktrace --warning-mode all --console=plain assembleRelease

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: addons-ide-next-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: addons-ide-next-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: addons-ide-next-build-reports
          path: |
            build/reports/**
            app/build/reports/**
